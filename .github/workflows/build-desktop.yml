name: Build RVR Studio Desktop

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

env:
  DOTNET_VERSION: '9.0.x'
  PROJECT: src/ui/RVR.Framework.Admin/RVR.Framework.Admin.csproj

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            rid: win-x64
            artifact: RVR-Studio-Setup-win-x64
          - name: macOS
            os: macos-latest
            rid: osx-x64
            artifact: RVR-Studio-Setup-macos
          - name: Linux
            os: ubuntu-latest
            rid: linux-x64
            artifact: RVR-Studio-linux-x64

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Publish
        run: >
          dotnet publish ${{ env.PROJECT }}
          -c Release
          -r ${{ matrix.rid }}
          --self-contained
          -p:AssemblyName=RVR.Studio.Desktop
          -p:TreatWarningsAsErrors=false
          -p:WarningLevel=0
          -o artifacts/publish

      - name: Package (Windows)
        if: matrix.name == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path artifacts/publish/* -DestinationPath "artifacts/${{ matrix.artifact }}.zip"

      - name: Package (macOS)
        if: matrix.name == 'macOS'
        run: |
          mkdir -p "dmg-staging/RVR Studio.app/Contents/MacOS"
          cp artifacts/publish/RVR.Studio.Desktop "dmg-staging/RVR Studio.app/Contents/MacOS/"
          chmod +x "dmg-staging/RVR Studio.app/Contents/MacOS/RVR.Studio.Desktop"
          cat > "dmg-staging/RVR Studio.app/Contents/Info.plist" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key><string>RVR.Studio.Desktop</string>
            <key>CFBundleIdentifier</key><string>com.rivora.studio</string>
            <key>CFBundleName</key><string>RVR Studio</string>
            <key>CFBundleVersion</key><string>4.0.0</string>
          </dict>
          </plist>
          PLIST
          ln -s /Applications dmg-staging/Applications
          hdiutil create -volname "RVR Studio" -srcfolder dmg-staging -ov -format UDZO "artifacts/${{ matrix.artifact }}.dmg"

      - name: Package (Linux)
        if: matrix.name == 'Linux'
        run: |
          chmod +x artifacts/publish/RVR.Studio.Desktop
          tar -czf "artifacts/${{ matrix.artifact }}.tar.gz" -C artifacts/publish .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.rid }}
          path: artifacts/${{ matrix.artifact }}.*

  publish-release:
    name: Attach to Release
    needs: [build]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List
        run: find artifacts/ -type f | sort

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: artifacts/*
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
