name: Build RVR Studio Desktop

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

env:
  DOTNET_VERSION: '9.0.x'
  PROJECT: src/ui/RVR.Framework.Admin/RVR.Framework.Admin.csproj

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            rid: win-x64
            artifact: RVR-Studio-Setup-win-x64.exe
            ext: exe
          - name: macOS
            os: macos-latest
            rid: osx-x64
            artifact: RVR-Studio-Setup-macos
            ext: dmg
          - name: Linux
            os: ubuntu-latest
            rid: linux-x64
            artifact: RVR-Studio-linux-x64.tar.gz
            ext: tar.gz

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore solution
        run: dotnet restore RVR.Framework.sln

      - name: Publish
        run: >
          dotnet publish ${{ env.PROJECT }}
          -c Release
          -r ${{ matrix.rid }}
          --self-contained
          --no-restore
          -p:PublishSingleFile=true
          -p:EnableCompressionInSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:AssemblyName=RVR.Studio.Desktop
          -o artifacts/publish

      - name: Package (Windows .exe)
        if: matrix.ext == 'exe'
        shell: pwsh
        run: |
          Copy-Item artifacts/publish/RVR.Studio.Desktop.exe artifacts/${{ matrix.artifact }}

      - name: Package (macOS .dmg)
        if: matrix.ext == 'dmg'
        run: |
          mkdir -p dmg-staging
          cp artifacts/publish/RVR.Studio.Desktop dmg-staging/
          chmod +x dmg-staging/RVR.Studio.Desktop
          # Create .app bundle
          mkdir -p "dmg-staging/RVR Studio.app/Contents/MacOS"
          cp dmg-staging/RVR.Studio.Desktop "dmg-staging/RVR Studio.app/Contents/MacOS/"
          cat > "dmg-staging/RVR Studio.app/Contents/Info.plist" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key><string>RVR.Studio.Desktop</string>
            <key>CFBundleIdentifier</key><string>com.rivora.studio</string>
            <key>CFBundleName</key><string>RVR Studio</string>
            <key>CFBundleVersion</key><string>4.0.0</string>
          </dict>
          </plist>
          PLIST
          rm dmg-staging/RVR.Studio.Desktop
          ln -s /Applications dmg-staging/Applications
          hdiutil create -volname "RVR Studio" -srcfolder dmg-staging -ov -format UDZO "artifacts/${{ matrix.artifact }}.dmg"

      - name: Package (Linux .tar.gz)
        if: matrix.ext == 'tar.gz'
        run: |
          chmod +x artifacts/publish/RVR.Studio.Desktop
          tar -czf "artifacts/${{ matrix.artifact }}" -C artifacts/publish .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.rid }}
          path: artifacts/${{ matrix.artifact }}*

  publish-release:
    name: Attach to Release
    needs: [build]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts/ -type f | sort

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            artifacts/RVR-Studio-Setup-win-x64.exe
            artifacts/RVR-Studio-Setup-macos.dmg
            artifacts/RVR-Studio-linux-x64.tar.gz
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
