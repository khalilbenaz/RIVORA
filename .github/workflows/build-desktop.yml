name: Build RVR Studio Desktop

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

env:
  DOTNET_VERSION: '9.0.x'
  PROJECT: tools/RVR.Studio.Desktop/RVR.Studio.Desktop.csproj

jobs:
  build-windows:
    name: Windows (.exe)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install MAUI workload
        run: dotnet workload install maui-windows

      - name: Restore (Windows TFM)
        run: dotnet restore ${{ env.PROJECT }} /p:TargetFramework=net9.0-windows10.0.19041.0

      - name: Publish (Windows x64)
        run: |
          dotnet publish ${{ env.PROJECT }} `
            /p:TargetFramework=net9.0-windows10.0.19041.0 `
            -c Release `
            -r win-x64 `
            --no-restore `
            -p:SelfContained=true `
            -p:PublishSingleFile=true `
            -p:EnableCompressionInSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -o artifacts/win-x64

      - name: Package
        run: |
          $exe = Get-ChildItem artifacts/win-x64/*.exe | Select-Object -First 1
          if ($exe) {
            Copy-Item $exe.FullName artifacts/RVR-Studio-Setup-win-x64.exe
          } else {
            Compress-Archive -Path artifacts/win-x64/* -DestinationPath artifacts/RVR-Studio-Setup-win-x64.zip
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-windows
          path: |
            artifacts/RVR-Studio-Setup-win-x64.exe
            artifacts/RVR-Studio-Setup-win-x64.zip

  build-macos:
    name: macOS (.dmg)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install MAUI workload
        run: dotnet workload install maui-maccatalyst

      - name: Restore (macOS TFM)
        run: dotnet restore ${{ env.PROJECT }} /p:TargetFramework=net9.0-maccatalyst

      - name: Publish (macOS)
        run: |
          dotnet publish ${{ env.PROJECT }} \
            /p:TargetFramework=net9.0-maccatalyst \
            -c Release \
            --no-restore \
            -p:CreatePackage=true \
            -o artifacts/macos

      - name: Create DMG
        run: |
          mkdir -p dmg-staging
          APP_PATH=$(find artifacts/macos -name "*.app" -type d | head -1)
          if [ -n "$APP_PATH" ]; then
            cp -R "$APP_PATH" dmg-staging/
            ln -s /Applications dmg-staging/Applications
          else
            cp -R artifacts/macos/* dmg-staging/
          fi
          hdiutil create -volname "RVR Studio" -srcfolder dmg-staging -ov -format UDZO artifacts/RVR-Studio-Setup-macos.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-macos
          path: artifacts/RVR-Studio-Setup-macos.dmg

  build-linux:
    name: Linux (self-contained)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore (net9.0)
        run: dotnet restore ${{ env.PROJECT }} /p:TargetFramework=net9.0

      - name: Publish (Linux x64)
        run: |
          dotnet publish ${{ env.PROJECT }} \
            /p:TargetFramework=net9.0 \
            -c Release \
            -r linux-x64 \
            --no-restore \
            --self-contained \
            -p:PublishSingleFile=true \
            -p:EnableCompressionInSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -o artifacts/linux-x64

      - name: Create tar.gz
        run: tar -czf artifacts/RVR-Studio-linux-x64.tar.gz -C artifacts/linux-x64 .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-linux
          path: artifacts/RVR-Studio-linux-x64.tar.gz

  publish-release:
    name: Attach installers to Release
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts/ -type f | sort

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            artifacts/RVR-Studio-Setup-win-x64.exe
            artifacts/RVR-Studio-Setup-win-x64.zip
            artifacts/RVR-Studio-Setup-macos.dmg
            artifacts/RVR-Studio-linux-x64.tar.gz
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
