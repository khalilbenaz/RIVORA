# GitHub Actions CI Pipeline for RIVORA Framework
# Complete CI/CD with Build, Test, Coverage, Security Scan

name: CI Pipeline

on:
  push:
    branches:
      - main
      - develop
      - 'feat/*'
      - 'bugfix/*'
      - 'hotfix/*'
    paths:
      - 'frontend/**'
      - 'src/**'
      - 'tests/**'
      - 'tools/**'
      - '*.sln'
      - '.github/workflows/ci.yml'
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'frontend/**'
      - 'src/**'
      - 'tests/**'
      - 'tools/**'
      - '*.sln'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read
  security-events: write

env:
  DOTNET_VERSION: '9.0.x'
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages
  COVERAGE_THRESHOLD: 80

jobs:
  # Job 1: Build Matrix
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        configuration: [Debug, Release]

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: 9.0.x

      - name: Cache NuGet packages
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore RVR.Framework.sln

      - name: Build
        run: dotnet build RVR.Framework.sln --configuration ${{ matrix.configuration }} --no-restore --verbosity minimal

  # Job 2: Run Unit Tests with Coverage
  unit-tests:
    name: Unit Tests & Coverage
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: 9.0.x

      - name: Cache NuGet packages
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore RVR.Framework.sln

      - name: Run unit tests (exclude integration tests and benchmarks)
        run: |
          dotnet test RVR.Framework.sln \
            --configuration Release \
            --verbosity normal \
            --logger "trx;LogFileName=test-results.trx" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults \
            --filter "FullyQualifiedName!~IntegrationTests&FullyQualifiedName!~Benchmarks" \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura

      - name: Upload test results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: unit-test-results
          path: |
            **/TestResults/*.trx
            **/TestResults/**/coverage.cobertura.xml
          retention-days: 7

      - name: Generate test results summary
        if: always()
        run: |
          echo "## Unit Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          for trx in $(find . -name "test-results.trx" -type f 2>/dev/null); do
            echo "- Found test result: $trx" >> $GITHUB_STEP_SUMMARY
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          # Count coverage files
          COVERAGE_FILES=$(find . -name "coverage.cobertura.xml" -type f 2>/dev/null | wc -l)
          echo "Coverage reports generated: $COVERAGE_FILES" >> $GITHUB_STEP_SUMMARY

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@18283e04ce6e62d37312384ff67231eb8fd56d24 # v4.7.1
        if: always()
        with:
          files: '**/TestResults/**/coverage.cobertura.xml'
          flags: backend
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Check coverage threshold (80%)
        run: |
          echo "## Coverage Threshold Check" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          THRESHOLD=${{ env.COVERAGE_THRESHOLD }}
          PASS=true
          for coverage_file in $(find . -name "coverage.cobertura.xml" -type f 2>/dev/null); do
            LINE_RATE=$(grep -oP 'line-rate="\K[^"]+' "$coverage_file" | head -1 || echo "0")
            if [ -n "$LINE_RATE" ]; then
              PERCENTAGE=$(echo "$LINE_RATE * 100" | bc -l 2>/dev/null | cut -d. -f1 || echo "0")
              echo "- Coverage: ${PERCENTAGE}% (threshold: ${THRESHOLD}%)" >> $GITHUB_STEP_SUMMARY
              if [ "${PERCENTAGE:-0}" -lt "$THRESHOLD" ]; then
                echo "  - **BELOW THRESHOLD**" >> $GITHUB_STEP_SUMMARY
                PASS=false
              fi
            fi
          done
          if [ "$PASS" = "false" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "> **Warning**: Some projects are below the ${THRESHOLD}% coverage threshold." >> $GITHUB_STEP_SUMMARY
          fi

  # Job 3: Integration Tests (separate from unit tests)
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: 9.0.x

      - name: Cache NuGet packages
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore RVR.Framework.sln

      - name: Run integration tests
        run: |
          dotnet test RVR.Framework.sln \
            --configuration Release \
            --verbosity normal \
            --logger "trx;LogFileName=integration-test-results.trx" \
            --results-directory ./TestResults \
            --filter "FullyQualifiedName~IntegrationTests" \
            || true

      - name: Upload integration test results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: integration-test-results
          path: |
            **/TestResults/*.trx
          retention-days: 7

      - name: Generate integration test summary
        if: always()
        run: |
          echo "## Integration Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          for trx in $(find . -name "integration-test-results.trx" -type f 2>/dev/null); do
            echo "- Found integration test result: $trx" >> $GITHUB_STEP_SUMMARY
          done

  # Job 4: Code Quality (Format + Analyzers)
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: 9.0.x

      - name: Check code format
        continue-on-error: true
        run: dotnet format --verify-no-changes --verbosity minimal

  # Job 5: Security Scan
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: 9.0.x

      - name: Restore dependencies
        run: dotnet restore RVR.Framework.sln

      - name: Check for vulnerable packages
        run: |
          echo "## Security Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Vulnerable Packages" >> $GITHUB_STEP_SUMMARY
          OUTPUT=$(dotnet list RVR.Framework.sln package --vulnerable --include-transitive 2>&1)
          echo "$OUTPUT" >> $GITHUB_STEP_SUMMARY
          if echo "$OUTPUT" | grep -q "has the following vulnerable packages"; then
            echo "::error::Vulnerable NuGet packages detected"
            exit 1
          fi
          echo "No vulnerable packages found." >> $GITHUB_STEP_SUMMARY

  # Job: SBOM Generation
  sbom:
    name: SBOM Generation
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: 9.0.x

      - name: Restore dependencies
        run: dotnet restore RVR.Framework.sln

      - name: Generate SBOM
        run: |
          dotnet tool install --global Microsoft.Sbom.DotNetTool 2>/dev/null || true
          sbom-tool generate -b . -bc src/ -pn RIVORA -pv ${{ github.sha }} -ps khalilbenaz -nsb https://github.com/khalilbenaz/RIVORA -m .

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: sbom
          path: _manifest/
          retention-days: 90

  # Job: License Compliance
  license-check:
    name: License Compliance
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: 9.0.x

      - name: Install license tool
        run: dotnet tool install --global dotnet-project-licenses 2>/dev/null || true

      - name: Check licenses
        run: |
          echo "## License Compliance Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          dotnet-project-licenses -i RVR.Framework.sln --include-transitive -u >> $GITHUB_STEP_SUMMARY 2>&1 || true
          # Check for GPL/AGPL licenses (incompatible with MIT)
          OUTPUT=$(dotnet-project-licenses -i RVR.Framework.sln --include-transitive 2>&1 || true)
          if echo "$OUTPUT" | grep -iE "GPL|AGPL|LGPL" | grep -v "MIT" > /dev/null 2>&1; then
            echo "::warning::Potentially incompatible licenses detected (GPL/AGPL). Review required."
          fi

  # Job: Secrets Scan
  secrets-scan:
    name: Secrets Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz | tar xz -C /usr/local/bin gitleaks

      - name: Run gitleaks
        run: gitleaks detect --source . --redact -v --exit-code 1

  # Job: AI Code Review with SARIF output
  ai-review:
    name: AI Code Review (SARIF)
    runs-on: ubuntu-latest
    needs: build
    continue-on-error: true
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: 9.0.x

      - name: Cache NuGet packages
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Run AI review with SARIF output
        continue-on-error: true
        run: |
          dotnet run --project tools/RVR.CLI/RVR.CLI.csproj -- ai review --all --output sarif --output-file rivora-review.sarif --ci .

      - name: Upload SARIF to GitHub Code Scanning
        if: always() && hashFiles('rivora-review.sarif') != ''
        uses: github/codeql-action/upload-sarif@ff0a06e83cb2de871e5a09832bc6a81e7276941f # v3.28.18
        with:
          sarif_file: rivora-review.sarif
          category: rivora-ai-review
        continue-on-error: true

  # Job: Frontend Build & Lint
  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Audit npm dependencies
        working-directory: frontend
        run: npm audit --audit-level=high || echo "::warning::npm audit found vulnerabilities"

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Run unit tests with coverage
        working-directory: frontend
        run: npx vitest run --coverage --coverage.reporter=lcov --coverage.reportsDirectory=./coverage

      - name: Upload frontend coverage to Codecov
        uses: codecov/codecov-action@18283e04ce6e62d37312384ff67231eb8fd56d24 # v4.7.1
        if: always()
        with:
          files: frontend/coverage/lcov.info
          flags: frontend
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # Job: Docker Security Scan
  docker-scan:
    name: Docker Security Scan
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Trivy
        run: |
          sudo apt-get install -y wget apt-transport-https gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update && sudo apt-get install -y trivy

      - name: Run Trivy filesystem scan
        run: trivy fs --severity CRITICAL,HIGH --exit-code 1 --scanners vuln .

  # Summary Job
  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, code-quality, security, secrets-scan, ai-review, frontend, sbom, license-check]
    if: always()

    steps:
      - name: Create Summary
        run: |
          echo "## CI Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests & Coverage | ${{ needs.unit-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Integration Tests | ${{ needs.integration-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Code Quality | ${{ needs.code-quality.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Scan | ${{ needs.security.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| AI Code Review | ${{ needs.ai-review.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | ${{ needs.frontend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| SBOM Generation | ${{ needs.sbom.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| License Compliance | ${{ needs.license-check.result }} |" >> $GITHUB_STEP_SUMMARY

  # Job 6: Publish NuGet Packages (Only on tags)
  publish-nuget:
    name: Publish NuGet Packages
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, security]
    environment: production
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: 9.0.x

      - name: Pack all framework modules
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "Packing all packable projects with version $VERSION"
          dotnet pack RVR.Framework.sln -c Release -o ./artifacts /p:PackageVersion=$VERSION

      - name: Sign NuGet packages
        if: env.NUGET_SIGNING_CERT != ''
        env:
          NUGET_SIGNING_CERT: ${{ secrets.NUGET_SIGNING_CERT }}
          NUGET_SIGNING_CERT_PASSWORD: ${{ secrets.NUGET_SIGNING_CERT_PASSWORD }}
        run: |
          echo "$NUGET_SIGNING_CERT" | base64 -d > signing.pfx
          for pkg in ./artifacts/*.nupkg; do
            dotnet nuget sign "$pkg" \
              --certificate-path signing.pfx \
              --certificate-password "$NUGET_SIGNING_CERT_PASSWORD" \
              --timestamper http://timestamp.digicert.com
          done
          rm -f signing.pfx

      - name: List generated packages
        run: |
          echo "## Generated NuGet Packages" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          ls -la ./artifacts/*.nupkg
          ls -la ./artifacts/*.nupkg >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Validate package count
        run: |
          PACKAGE_COUNT=$(ls ./artifacts/*.nupkg 2>/dev/null | wc -l)
          echo "Total packages generated: $PACKAGE_COUNT"
          if [ "$PACKAGE_COUNT" -le 1 ]; then
            echo "::error::Expected more than 1 NuGet package but found $PACKAGE_COUNT. Ensure all framework modules are packable."
            exit 1
          fi
          echo "Package validation passed: $PACKAGE_COUNT packages generated."

      - name: Push to NuGet.org
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if [ -n "$NUGET_API_KEY" ]; then
            dotnet nuget push "./artifacts/*.nupkg" --api-key "$NUGET_API_KEY" --source "https://api.nuget.org/v3/index.json" --skip-duplicate
          else
            echo "NUGET_API_KEY not set, skipping NuGet.org push"
          fi

      - name: Push to GitHub Packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: dotnet nuget push "./artifacts/*.nupkg" --api-key "$GITHUB_TOKEN" --source "https://nuget.pkg.github.com/khalilbenaz/index.json" --skip-duplicate

      - name: Upload NuGet artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: nuget-packages
          path: ./artifacts/*.nupkg
          retention-days: 30
