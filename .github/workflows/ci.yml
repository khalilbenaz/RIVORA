# GitHub Actions CI Pipeline for KBA Framework
# Complete CI/CD with Build, Test, Coverage, Security Scan

name: CI Pipeline

on:
  push:
    branches:
      - main
      - develop
      - 'feat/*'
      - 'bugfix/*'
      - 'hotfix/*'
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

env:
  DOTNET_VERSION: '8.0.x'
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages
  COVERAGE_THRESHOLD: 70

jobs:
  # Job 1: Build Matrix
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        configuration: [Debug, Release]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore KBA.Framework.sln

      - name: Build
        run: dotnet build KBA.Framework.sln --configuration ${{ matrix.configuration }} --no-restore --verbosity minimal

  # Job 2: Run Tests with Coverage
  test:
    name: Test & Coverage
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore KBA.Framework.sln

      - name: Run unit tests (exclude integration tests)
        run: |
          dotnet test KBA.Framework.sln \
            --configuration Release \
            --no-restore \
            --verbosity normal \
            --logger "trx;LogFileName=test-results.trx" \
            --collect:"XPlat Code Coverage" \
            --filter "FullyQualifiedName!~IntegrationTests"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            **/TestResults/*.trx
          retention-days: 7

  # Job 3: Code Quality (Format + Analyzers)
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x

      - name: Check code format
        run: dotnet format --verify-no-changes --verbosity minimal || echo "Format check completed"

  # Job 4: Security Scan
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x

      - name: Run NuGet audit
        run: dotnet nuget audit KBA.Framework.sln --include-transitive || true

      - name: List vulnerable packages
        run: |
          echo "## Security Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Vulnerable Packages" >> $GITHUB_STEP_SUMMARY
          dotnet list KBA.Framework.sln package --vulnerable --include-transitive >> $GITHUB_STEP_SUMMARY || echo "No vulnerabilities found" >> $GITHUB_STEP_SUMMARY

  # Summary Job
  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [test, code-quality, security]
    if: always()
    
    steps:
      - name: Create Summary
        run: |
          echo "## CI Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests & Coverage | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Code Quality | ${{ needs.code-quality.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Scan | ${{ needs.security.result }} |" >> $GITHUB_STEP_SUMMARY

  # Job 5: Publish NuGet Packages (Only on tags)
  publish-nuget:
    name: Publish NuGet Packages
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test, code-quality, security]
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x

      - name: Pack KBA.Framework projects
        run: |
          # Extraire la version du tag (ex: v2.2.0 -> 2.2.0)
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "Packing version $VERSION"
          
          dotnet pack src/KBA.Framework.Core/KBA.Framework.Core.csproj -c Release -o ./artifacts /p:PackageVersion=$VERSION
          dotnet pack src/KBA.Framework.Domain/KBA.Framework.Domain.csproj -c Release -o ./artifacts /p:PackageVersion=$VERSION
          dotnet pack src/KBA.Framework.Application/KBA.Framework.Application.csproj -c Release -o ./artifacts /p:PackageVersion=$VERSION
          dotnet pack src/KBA.Framework.Infrastructure/KBA.Framework.Infrastructure.csproj -c Release -o ./artifacts /p:PackageVersion=$VERSION
          dotnet pack src/KBA.Framework.MultiTenancy/KBA.Framework.MultiTenancy.csproj -c Release -o ./artifacts /p:PackageVersion=$VERSION
          dotnet pack src/KBA.Framework.Security/KBA.Framework.Security.csproj -c Release -o ./artifacts /p:PackageVersion=$VERSION
          dotnet pack src/KBA.Framework.RealTime/KBA.Framework.RealTime.csproj -c Release -o ./artifacts /p:PackageVersion=$VERSION
          dotnet pack src/KBA.Framework.Notifications/KBA.Framework.Notifications.csproj -c Release -o ./artifacts /p:PackageVersion=$VERSION
          dotnet pack tools/KBA.CLI/KBA.CLI.csproj -c Release -o ./artifacts /p:PackageVersion=$VERSION

      - name: Push to GitHub Packages
        run: dotnet nuget push ./artifacts/*.nupkg --api-key ${{ secrets.GITHUB_TOKEN }} --source https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json --skip-duplicate

      - name: Push to NuGet.org
        run: dotnet nuget push ./artifacts/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

