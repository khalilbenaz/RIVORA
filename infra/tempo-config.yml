# Tempo Configuration for RIVORA Framework

server:
  http_listen_port: 3200
  log_level: info

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318
    jaeger:
      protocols:
        thrift_http:
          endpoint: 0.0.0.0:14268
        grpc:
          endpoint: 0.0.0.0:14250
        thrift_binary:
          endpoint: 0.0.0.0:6832
        thrift_compact:
          endpoint: 0.0.0.0:6831
    zipkin:
      endpoint: 0.0.0.0:9411

ingester:
  max_block_duration: 5m
  max_block_bytes: 104857600
  trace_idle_period: 10s
  max_traces_per_user: 10000

compactor:
  compaction:
    block_retention: 48h
    compacted_block_retention: 1h

querier:
  max_concurrent_queries: 20
  query_timeout: 30s

storage:
  trace:
    backend: local
    wal:
      path: /tmp/tempo/wal
      enabled: true
    local:
      path: /tmp/tempo/blocks
    pool:
      max_workers: 100
      queue_depth: 10000

overrides:
  defaults:
    metrics_generator:
      processors: [service-graphs, span-metrics]
      traces_storage_path: /tmp/tempo/generator

metrics_generator:
  registry:
    host: 0.0.0.0
    port: 8889
  storage:
    path: /tmp/tempo/generator/wal
    remote_write:
      - url: http://prometheus:9090/api/v1/write
        send_exemplars: true

usage_report:
  usage_report_enabled: false
